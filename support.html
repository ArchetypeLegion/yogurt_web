
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Поддержка проекта</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

    <section class="support_page">
        <div class="support_card">
            <h1>Поддержать проект</h1>

            <p class="support_text">
                Ваша поддержка помогает нам развивать проект, улучшать материалы
                и создавать больше полезной информации о качественных продуктах.
            </p>

            <form class="support_form">
                <label>Ваше имя</label>
                <input type="text" placeholder="Например: Алексей">

                <label>Email</label>
                <input type="email" placeholder="example@mail.com">

                <label>Сумма поддержки</label>
                <select>
                    <option>100 ₽</option>
                    <option>300 ₽</option>
                    <option>500 ₽</option>
                    <option>1000 ₽</option>
                    <option>Другая сумма</option>
                </select>

                <label>Комментарий</label>
                <textarea placeholder="Ваше сообщение проекту"></textarea>

                <button type="submit">Отправить поддержку</button>
            </form>

            <a href="index.html" class="back_home">← Вернуться на главную</a>
        </div>
    </section>

</body>
</html>
